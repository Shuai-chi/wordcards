<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>單字學習卡 Pro - 極簡快照版 SRS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    @keyframes fadeInZoom { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    .animate-fade-in-zoom { animation: fadeInZoom 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .card-active:active { transform: scale(0.99); }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col items-center py-6 px-4 font-sans text-slate-800">

  <div id="view-dashboard" class="w-full max-w-2xl flex flex-col space-y-5 animate-fade-in-zoom">
    
    <header class="w-full flex items-center justify-between bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
      <h1 class="text-2xl font-extrabold tracking-tight text-slate-900 flex items-center">
        <i data-lucide="brain-circuit" class="w-7 h-7 mr-2 text-indigo-600"></i> 單字記憶庫
      </h1>
      <label class="p-2 cursor-pointer bg-indigo-50 border border-indigo-100 rounded-xl hover:bg-indigo-100 text-indigo-600 transition-colors flex items-center shadow-sm">
        <i data-lucide="file-plus-2" class="w-5 h-5"></i>
        <span class="ml-2 font-bold text-sm hidden sm:inline">新增套牌</span>
        <input type="file" id="file-upload" accept=".csv" multiple class="hidden" />
      </label>
    </header>

    <div id="daily-report-card" class="hidden w-full bg-gradient-to-r from-indigo-500 to-purple-600 p-5 rounded-2xl shadow-lg text-white flex flex-col sm:flex-row justify-between items-center gap-4">
      <div class="w-full sm:w-auto text-center sm:text-left">
        <h3 class="font-extrabold text-lg flex items-center justify-center sm:justify-start"><i data-lucide="flame" class="w-5 h-5 mr-1 text-orange-300"></i> 今日戰報</h3>
        <p class="text-indigo-100 text-xs mt-1">記憶以每日最後一次決策為準，不重複累加。</p>
      </div>
      <div class="flex gap-2 sm:gap-4 text-center bg-white/10 p-2 sm:p-3 rounded-xl backdrop-blur-sm w-full sm:w-auto justify-around overflow-x-auto no-scrollbar">
        <div class="px-2"><p class="text-[10px] text-indigo-200 uppercase font-bold whitespace-nowrap">練習次數</p><p id="rep-sessions" class="font-black text-lg sm:text-xl">0</p></div>
        <div class="px-2"><p class="text-[10px] text-green-300 uppercase font-bold whitespace-nowrap">Easy</p><p id="rep-easy" class="font-black text-lg sm:text-xl text-green-300">0</p></div>
        <div class="px-2"><p class="text-[10px] text-blue-300 uppercase font-bold whitespace-nowrap">Good</p><p id="rep-good" class="font-black text-lg sm:text-xl text-blue-300">0</p></div>
        <div class="px-2"><p class="text-[10px] text-orange-300 uppercase font-bold whitespace-nowrap">Hard</p><p id="rep-hard" class="font-black text-lg sm:text-xl text-orange-300">0</p></div>
        <div class="px-2"><p class="text-[10px] text-red-300 uppercase font-bold whitespace-nowrap">Again</p><p id="rep-again" class="font-black text-lg sm:text-xl text-red-300">0</p></div>
      </div>
    </div>

    <div class="w-full bg-slate-800 p-5 rounded-2xl shadow-lg border border-slate-700 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
      <div>
        <h3 class="text-white font-bold text-lg flex items-center"><i data-lucide="battery-charging" class="w-5 h-5 mr-2 text-yellow-400"></i> 全域精力預算</h3>
        <p class="text-slate-400 text-xs mt-1">優先償還舊卡複習，剩餘額度才按比例抽取新卡。</p>
      </div>
      <div class="flex items-center bg-slate-700 rounded-xl p-1 shrink-0">
        <input type="number" id="input-global-limit" min="10" step="10" class="w-20 bg-transparent text-white font-extrabold text-xl text-center focus:outline-none" value="150">
        <span class="text-slate-400 font-medium px-3 border-l border-slate-600">張</span>
      </div>
    </div>

    <div id="deck-list" class="w-full flex flex-col gap-4"></div>

    <div class="w-full bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col gap-4">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <button onclick="exportDatabase()" class="flex items-center justify-center p-3 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-xl text-slate-700 font-medium transition-colors">
          <i data-lucide="download-cloud" class="w-5 h-5 mr-2 text-blue-500"></i> 備份進度
        </button>
        <label class="flex items-center justify-center p-3 cursor-pointer bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-xl text-slate-700 font-medium transition-colors">
          <i data-lucide="upload-cloud" class="w-5 h-5 mr-2 text-green-500"></i> 還原進度
          <input type="file" id="file-import" accept=".json" class="hidden" />
        </label>
      </div>
      <div class="flex items-center mt-2 px-1">
        <input type="checkbox" id="auto-backup-toggle" class="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500 cursor-pointer">
        <label for="auto-backup-toggle" class="ml-2 text-sm font-bold text-slate-600 cursor-pointer select-none">開啟自動備份 (完成練習時自動下載)</label>
      </div>
    </div>

    <button id="btn-start-session" onclick="startLearningSession()" class="sticky bottom-6 w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold text-lg rounded-2xl shadow-xl shadow-indigo-200 transition-all transform hover:-translate-y-1 disabled:opacity-50 disabled:cursor-not-allowed">
      開始今日練習
    </button>
  </div>

  <div id="view-learning" class="hidden w-full max-w-2xl flex flex-col items-center space-y-4 animate-fade-in-zoom">
    <div class="w-full flex items-center bg-white px-4 py-2.5 rounded-2xl shadow-sm border border-slate-200">
      <button onclick="returnToDashboard()" class="p-1.5 mr-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-lg transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
      <div id="progress-text" class="text-xs sm:text-sm font-extrabold text-slate-700 w-16 text-center">0 / 0</div>
      <div class="flex-1 mx-2 sm:mx-4 h-2 bg-slate-100 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-300 ease-out" style="width: 0%;"></div>
      </div>
    </div>
    <div id="flashcard" class="relative w-full h-[65vh] min-h-[450px] bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden cursor-pointer flex flex-col card-active transition-transform select-none">
      <div id="card-front" class="flex-1 flex flex-col p-4 sm:p-6 pb-16 pt-6 pointer-events-none">
        <div class="flex-1 flex items-center justify-center text-center">
          <span id="front-word" class="text-5xl sm:text-6xl font-extrabold tracking-tight text-slate-800 break-words"></span>
          <button id="btn-speak-front" class="ml-4 p-3 text-indigo-500 hover:bg-indigo-50 rounded-full transition-colors pointer-events-auto shadow-sm border border-transparent hover:border-indigo-100 shrink-0"><i data-lucide="volume-2" class="w-8 h-8"></i></button>
        </div>
      </div>
      <div id="card-back" class="hidden flex-1 flex flex-col p-4 sm:p-8 pb-20 pt-8 pointer-events-none">
        <div class="flex-1 flex flex-col w-full text-left overflow-hidden">
          <div id="back-lines" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar pointer-events-auto"></div>
        </div>
      </div>
      <div id="srs-buttons" class="hidden absolute bottom-0 left-0 w-full bg-white border-t border-slate-100 p-2 sm:p-3 grid grid-cols-4 gap-2 z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] cursor-default">
        <button onclick="rateCard('again', event)" class="py-3 rounded-xl font-bold text-sm bg-red-50 text-red-600 hover:bg-red-100 transition-all cursor-pointer">Again</button>
        <button onclick="rateCard('hard', event)" class="py-3 rounded-xl font-bold text-sm bg-orange-50 text-orange-600 hover:bg-orange-100 transition-all cursor-pointer">Hard</button>
        <button onclick="rateCard('good', event)" class="py-3 rounded-xl font-bold text-sm bg-blue-50 text-blue-600 hover:bg-blue-100 transition-all cursor-pointer">Good</button>
        <button onclick="rateCard('easy', event)" class="py-3 rounded-xl font-bold text-sm bg-green-50 text-green-600 hover:bg-green-100 transition-all cursor-pointer">Easy</button>
      </div>
    </div>
  </div>

  <div id="view-finished" class="hidden w-full max-w-xl bg-white rounded-3xl shadow-xl border border-slate-100 p-8 mt-6 flex flex-col items-center animate-fade-in-zoom">
    <i data-lucide="party-popper" class="w-20 h-20 text-indigo-500 mb-4"></i>
    <h2 class="text-3xl font-extrabold text-slate-800 mb-6">今日練習完成！</h2>
    <button onclick="finishSession()" class="flex items-center w-full justify-center py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-md transition-colors text-lg">
      <i data-lucide="home" class="w-5 h-5 mr-2"></i> 返回目錄
    </button>
  </div>

  <div id="modal-settings" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex justify-center items-center z-50 px-4 animate-fade-in-zoom">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-6 relative">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-xl font-extrabold text-slate-800">套牌管理</h3>
        <button onclick="closeSettingsModal()" class="text-slate-400 hover:text-slate-600 bg-slate-100 hover:bg-slate-200 p-1.5 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">重新命名</label>
          <input type="text" id="input-deck-name" class="w-full border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none font-bold">
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">新單字權重</label>
          <div class="flex items-center">
            <input type="number" id="input-new-limit" min="0" class="flex-1 border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none font-bold">
            <span class="ml-3 text-sm font-bold text-slate-500">個/日</span>
          </div>
        </div>
      </div>
      <div class="mt-8 flex flex-col gap-3">
        <button onclick="saveSettings()" class="w-full py-3 text-white font-bold bg-indigo-600 hover:bg-indigo-700 rounded-xl shadow-md transition-colors">儲存</button>
        <button onclick="resetDeckProgress()" class="w-full py-3 text-red-600 font-bold bg-red-50 hover:bg-red-100 rounded-xl transition-colors border border-red-100 flex justify-center items-center"><i data-lucide="rotate-ccw" class="w-4 h-4 mr-2"></i> 重置進度</button>
      </div>
    </div>
  </div>

  <script>
    const DB_NAME = 'FlashcardSRS';
    const DB_VERSION = 1;
    let db;

    const initDB = () => {
      return new Promise((resolve) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          const database = e.target.result;
          if (!database.objectStoreNames.contains('decks')) database.createObjectStore('decks', { keyPath: 'id' });
          if (!database.objectStoreNames.contains('cards')) {
            const cardStore = database.createObjectStore('cards', { keyPath: 'id' });
            cardStore.createIndex('deckId', 'deckId', { unique: false });
          }
        };
        request.onsuccess = (e) => { db = e.target.result; resolve(db); };
      });
    };

    const runQuery = (storeName, mode, callback) => {
      return new Promise((resolve) => {
        const tx = db.transaction(storeName, mode);
        const store = tx.objectStore(storeName);
        const request = callback(store);
        request.onsuccess = () => resolve(request.result);
      });
    };

    const DB = {
      getAllDecks: () => runQuery('decks', 'readonly', s => s.getAll()),
      putDeck: (deck) => runQuery('decks', 'readwrite', s => s.put(deck)),
      deleteDeck: async (id) => {
        await runQuery('decks', 'readwrite', s => s.delete(id));
        const tx = db.transaction('cards', 'readwrite');
        const index = tx.objectStore('cards').index('deckId');
        const request = index.openCursor(IDBKeyRange.only(id));
        request.onsuccess = (e) => { const cursor = e.target.result; if (cursor) { cursor.delete(); cursor.continue(); } };
      },
      putCards: (cards) => {
        return new Promise((resolve) => {
          const tx = db.transaction('cards', 'readwrite');
          cards.forEach(c => tx.objectStore('cards').put(c));
          tx.oncomplete = () => resolve();
        });
      },
      updateCard: (card) => runQuery('cards', 'readwrite', s => s.put(card)),
      getAllCards: () => runQuery('cards', 'readonly', s => s.getAll()),
      getCardsByDeck: (id) => runQuery('cards', 'readonly', s => s.index('deckId').getAll(id))
    };

    const appState = {
      decks: [], selectedDecks: new Set(),
      sessionQueue: [], initialTotal: 0, seenCardIds: new Set(),
      isFlipped: false, editingDeckId: null, dailyReport: { date: '', sessions: 0, cardFinalRatings: {} }
    };

    const getTodayStr = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; };

    // --- 修正版戰報載入 ---
    const loadDailyReport = async () => {
      const todayStr = getTodayStr();
      const saved = JSON.parse(localStorage.getItem('srsDailyReport') || '{}');
      if (saved.date !== todayStr) { 
        appState.dailyReport = { date: todayStr, sessions: 0, cardFinalRatings: {} }; 
        localStorage.setItem('srsDailyReport', JSON.stringify(appState.dailyReport)); 
      } else { appState.dailyReport = saved; }
      
      // 動態統計資料庫中今日的最終狀態
      const allCards = await DB.getAllCards();
      const ratings = {};
      allCards.forEach(c => {
        if (c.lastReviewedDate === todayStr && c.baselineStats) {
          // 找尋對應今天的最終狀態 (透過比較 baseline 與 current)
          // 這裡簡化：從 session 的最後決策紀錄中提取
        }
      });
      renderDailyReport();
    };
    
    const renderDailyReport = () => {
      if (appState.dailyReport.sessions > 0) {
        document.getElementById('daily-report-card').classList.remove('hidden'); document.getElementById('daily-report-card').classList.add('flex');
        document.getElementById('rep-sessions').textContent = appState.dailyReport.sessions;
        
        let counts = { easy: 0, good: 0, hard: 0, again: 0 };
        Object.values(appState.dailyReport.cardFinalRatings).forEach(r => { if(counts[r] !== undefined) counts[r]++; });
        
        document.getElementById('rep-easy').textContent = counts.easy;
        document.getElementById('rep-good').textContent = counts.good;
        document.getElementById('rep-hard').textContent = counts.hard;
        document.getElementById('rep-again').textContent = counts.again;
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      lucide.createIcons(); await initDB(); await loadDailyReport();
      const globalInput = document.getElementById('input-global-limit');
      globalInput.value = localStorage.getItem('globalDailyLimit') || 150;
      globalInput.addEventListener('change', (e) => { localStorage.setItem('globalDailyLimit', Math.max(10, parseInt(e.target.value) || 150)); calculateExpectedQueue(); });
      document.getElementById('auto-backup-toggle').checked = localStorage.getItem('autoBackup') === 'true';
      document.getElementById('auto-backup-toggle').addEventListener('change', (e) => localStorage.setItem('autoBackup', e.target.checked));
      document.getElementById('file-upload').addEventListener('change', handleCSVUpload);
      document.getElementById('file-import').addEventListener('change', importDatabase);
      await loadDashboard();
    });

    const analyzeDeck = async (deck) => {
      const cards = await DB.getCardsByDeck(deck.id); const now = Date.now(); const todayStr = getTodayStr();
      let newCount = 0, gradCount = 0, dueCount = 0;
      cards.forEach(c => {
        if (c.state === 'new') newCount++; else if (c.state === 'graduated') gradCount++;
        if (c.state === 'learning' || (c.state === 'graduated' && c.nextReviewDate <= now) || c.lastReviewedDate === todayStr) dueCount++;
      });
      return { ...deck, total: cards.length, dueCount, newCount, gradCount, learnCount: cards.length - newCount - gradCount };
    };

    const loadDashboard = async () => {
      const rawDecks = await DB.getAllDecks(); appState.decks = await Promise.all(rawDecks.map(analyzeDeck)); renderDashboard();
    };

    const renderDashboard = () => {
      const listEl = document.getElementById('deck-list'); listEl.innerHTML = '';
      if (appState.decks.length === 0) {
        listEl.innerHTML = `<div class="text-center py-10 bg-white rounded-2xl border border-dashed border-slate-300"><p class="text-slate-400 font-bold text-sm">尚未匯入套牌</p></div>`;
        lucide.createIcons(); document.getElementById('btn-start-session').disabled = true; return;
      }
      appState.decks.forEach(deck => {
        const isSelected = appState.selectedDecks.has(deck.id);
        const gradPct = (deck.gradCount / deck.total) * 100;
        const learnPct = (deck.learnCount / deck.total) * 100;
        const newPct = (deck.newCount / deck.total) * 100;
        const card = document.createElement('div');
        card.className = `p-4 sm:p-5 bg-white rounded-2xl border transition-all cursor-pointer flex flex-col gap-4 ${isSelected ? 'border-indigo-500 shadow-md ring-2 ring-indigo-500' : 'border-slate-200 shadow-sm hover:border-indigo-300'}`;
        card.onclick = () => { toggleDeckSelection(deck.id); calculateExpectedQueue(); };
        card.innerHTML = `
          <div class="flex items-center w-full">
            <div class="flex-shrink-0 w-6 h-6 mr-3 rounded-md border-2 flex items-center justify-center transition-colors ${isSelected ? 'bg-indigo-500 border-indigo-500 text-white' : 'border-slate-300 bg-slate-50'}">${isSelected ? '<i data-lucide="check" class="w-4 h-4"></i>' : ''}</div>
            <div class="flex-1 min-w-0"><h3 class="text-lg font-black text-slate-800 truncate">${deck.name}</h3><p class="text-[11px] font-bold text-slate-400">總數: ${deck.total}</p></div>
            <div class="flex gap-2 ml-2">
              <div class="px-2 py-1.5 bg-slate-50 rounded-lg border border-slate-200"><p class="text-[9px] font-bold text-slate-400">新字權重</p><p class="text-xs font-black text-slate-600">${deck.newCardLimit}</p></div>
              <div class="px-2 py-1.5 bg-orange-50 rounded-lg border border-orange-200"><p class="text-[9px] font-bold text-orange-400">待辦</p><p class="text-xs font-black text-orange-600">${deck.dueCount}</p></div>
            </div>
            <div class="flex gap-1 ml-2 border-l pl-2 border-slate-100">
              <button onclick="openSettingsModal('${deck.id}', event)" class="p-2 text-slate-300 hover:text-indigo-600 transition-colors"><i data-lucide="settings-2" class="w-5 h-5"></i></button>
              <button onclick="deleteDeck('${deck.id}', event)" class="p-2 text-slate-300 hover:text-red-600 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
            </div>
          </div>
          <div class="w-full h-2 bg-slate-100 rounded-full flex overflow-hidden"><div style="width: ${gradPct}%" class="bg-green-500"></div><div style="width: ${learnPct}%" class="bg-yellow-400"></div><div style="width: ${newPct}%" class="bg-transparent"></div></div>
        `; listEl.appendChild(card);
      });
      lucide.createIcons(); calculateExpectedQueue();
    };

    const calculateExpectedQueue = async () => {
      const btn = document.getElementById('btn-start-session');
      if (appState.selectedDecks.size === 0) { btn.disabled = true; btn.textContent = '請先勾選套牌'; return; }
      let globalLimit = parseInt(document.getElementById('input-global-limit').value) || 150;
      let selectedDecksData = appState.decks.filter(d => appState.selectedDecks.has(d.id));
      const todayStr = getTodayStr(); let mandatoryCount = 0; let totalTargetNew = 0;
      for(const deck of selectedDecksData) {
        const cards = await DB.getCardsByDeck(deck.id); let drawnNewToday = 0;
        cards.forEach(c => {
          const isTouchedToday = c.lastReviewedDate === todayStr;
          const isDue = c.state === 'learning' || (c.state === 'graduated' && c.nextReviewDate <= Date.now());
          if (isTouchedToday || isDue) { mandatoryCount++; if (isTouchedToday && c.baselineStats && c.baselineStats.state === 'new') drawnNewToday++; }
        });
        totalTargetNew += Math.max(0, deck.newCardLimit - drawnNewToday);
      }
      let expectedCount = mandatoryCount >= globalLimit ? globalLimit : mandatoryCount + Math.min(globalLimit - mandatoryCount, totalTargetNew);
      if (expectedCount === 0) { btn.disabled = true; btn.textContent = '今日已無任務'; } else { btn.disabled = false; btn.textContent = `開始練習 (${expectedCount} 張)`; }
    };

    const openSettingsModal = (deckId, event) => {
      event.stopPropagation(); appState.editingDeckId = deckId; const deck = appState.decks.find(d => d.id === deckId);
      document.getElementById('input-deck-name').value = deck.name; document.getElementById('input-new-limit').value = deck.newCardLimit;
      document.getElementById('modal-settings').classList.remove('hidden');
    };
    const closeSettingsModal = () => { document.getElementById('modal-settings').classList.add('hidden'); appState.editingDeckId = null; };
    const saveSettings = async () => {
      if (!appState.editingDeckId) return; const deck = await runQuery('decks', 'readonly', s => s.get(appState.editingDeckId));
      if (deck) { deck.name = document.getElementById('input-deck-name').value.trim() || deck.name; deck.newCardLimit = Math.max(0, parseInt(document.getElementById('input-new-limit').value, 10) || 0); await DB.putDeck(deck); await loadDashboard(); }
      closeSettingsModal();
    };
    const resetDeckProgress = async () => {
      if(!confirm('重置進度？')) return;
      const cards = await DB.getCardsByDeck(appState.editingDeckId);
      cards.forEach(c => { c.state = 'new'; c.nextReviewDate = 0; c.interval = 0; c.easeFactor = 2.5; c.lastReviewedDate = null; c.baselineStats = null; });
      await DB.putCards(cards); await loadDashboard(); closeSettingsModal();
    };
    const toggleDeckSelection = (id) => { appState.selectedDecks.has(id) ? appState.selectedDecks.delete(id) : appState.selectedDecks.add(id); };
    const deleteDeck = async (id, e) => { e.stopPropagation(); if(confirm('刪除套牌？')) { await DB.deleteDeck(id); appState.selectedDecks.delete(id); await loadDashboard(); } };

    const parseCSV = (text) => {
      const result = []; let row = [], inQuotes = false, currentVal = '';
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        if (inQuotes) { if (char === '"') { if (text[i + 1] === '"') { currentVal += '"'; i++; } else inQuotes = false; } else currentVal += char; }
        else {
          if (char === '"') inQuotes = true; else if (char === ',') { row.push(currentVal); currentVal = ''; }
          else if (char === '\n' || char === '\r') { row.push(currentVal); if (row.length > 1 || row[0] !== '') result.push(row); row = []; currentVal = ''; if (char === '\r' && text[i + 1] === '\n') i++; } else currentVal += char;
        }
      }
      if (currentVal || row.length > 0) { row.push(currentVal); result.push(row); } return result;
    };

    const handleCSVUpload = async (e) => {
      const files = Array.from(e.target.files); if (files.length === 0) return;
      for (const file of files) {
        const deckName = file.name.replace(/\.[^/.]+$/, "");
        const text = await new Promise((res) => { const r = new FileReader(); r.onload = (ev) => res(ev.target.result); r.readAsText(file); });
        const parsed = parseCSV(text); const deckId = 'deck_' + Date.now() + Math.floor(Math.random()*1000); 
        await DB.putDeck({ id: deckId, name: deckName, createdAt: Date.now(), newCardLimit: 20 });
        const cards = parsed.filter(row => row.length >= 2).map((row, idx) => {
          const col1 = row[0].trim(); const col2 = row[1].trim();
          const wordMatch = col1.match(/[a-zA-Z\-\s]+/); const cleanWord = wordMatch ? wordMatch[0].trim() : col1.replace(/^單字：\s*/, '').trim();
          const backLines = col2.split('\n').map(l => l.trim()).filter(l => l);
          const exLine = backLines.find(l => l.startsWith('例句：')) || ''; const exTTS = exLine.replace(/^例句：\s*/, '').replace(/[(（].*?[)）]/g, '').trim();
          return { id: `${deckId}_card_${idx}`, deckId: deckId, front: cleanWord, wordTTS: cleanWord, backLines: JSON.stringify(backLines), exampleTTS: exTTS, state: 'new', nextReviewDate: 0, interval: 0, easeFactor: 2.5, lastReviewedDate: null, baselineStats: null };
        });
        await DB.putCards(cards); appState.selectedDecks.add(deckId);
      }
      e.target.value = null; await loadDashboard();
    };

    // --- 核心：死鎖機制 ---
    const startLearningSession = async () => {
      let globalLimit = parseInt(document.getElementById('input-global-limit').value) || 150;
      let selectedDecksData = appState.decks.filter(d => appState.selectedDecks.has(d.id));
      const now = Date.now(); const todayStr = getTodayStr();
      let allMandatory = []; let allNewPool = {}; let totalTargetNew = 0;

      for (const deck of selectedDecksData) {
        const cards = await DB.getCardsByDeck(deck.id);
        let drawnNewToday = 0;
        const mandatoryDeck = cards.filter(c => {
          const isTouchedToday = c.lastReviewedDate === todayStr;
          const isDue = c.state === 'learning' || (c.state === 'graduated' && c.nextReviewDate <= now);
          if (isTouchedToday && c.baselineStats && c.baselineStats.state === 'new') drawnNewToday++;
          return isTouchedToday || isDue;
        });
        allMandatory.push(...mandatoryDeck);
        const deckTargetNew = Math.max(0, deck.newCardLimit - drawnNewToday);
        totalTargetNew += deckTargetNew;
        allNewPool[deck.id] = { cards: cards.filter(c => c.state === 'new' && c.lastReviewedDate !== todayStr), target: deckTargetNew };
      }

      allMandatory = [...new Map(allMandatory.map(i => [i.id, i])).values()];
      allMandatory.sort((a, b) => a.nextReviewDate - b.nextReviewDate);

      let queue = [];
      if (allMandatory.length >= globalLimit) { queue = allMandatory.slice(0, globalLimit); } 
      else {
        queue = [...allMandatory]; let budget = globalLimit - allMandatory.length;
        if (totalTargetNew > 0) {
          for (const dId in allNewPool) {
            const p = allNewPool[dId];
            if (p.target > 0) {
              let allocate = Math.min(Math.round(budget * (p.target / totalTargetNew)), p.target);
              queue.push(...p.cards.slice(0, allocate));
            }
          }
        }
      }
      queue.sort(() => Math.random() - 0.5);
      appState.sessionQueue = queue; appState.initialTotal = queue.length; appState.seenCardIds = new Set(); appState.isFlipped = false;
      document.getElementById('view-dashboard').classList.add('hidden'); document.getElementById('view-finished').classList.add('hidden'); document.getElementById('view-learning').classList.remove('hidden');
      updateSessionUI(); readCurrent();
    };

    const rateCard = async (rating, event) => {
      event.stopPropagation(); const currentCard = appState.sessionQueue[0]; appState.sessionQueue.shift(); appState.seenCardIds.add(currentCard.id);
      
      // 更新練習結果紀錄
      appState.dailyReport.cardFinalRatings[currentCard.id] = rating;
      localStorage.setItem('srsDailyReport', JSON.stringify(appState.dailyReport));

      const todayStr = getTodayStr(); let baseE = currentCard.easeFactor; let baseI = currentCard.interval;
      if (currentCard.lastReviewedDate !== todayStr) { currentCard.baselineStats = { easeFactor: baseE, interval: baseI, state: currentCard.state }; currentCard.lastReviewedDate = todayStr; }
      else if (currentCard.baselineStats) { baseE = currentCard.baselineStats.easeFactor; baseI = currentCard.baselineStats.interval; }

      let nE = baseE; let nI = baseI; let isDone = true;
      if (rating === 'again') { nE = Math.max(1.3, baseE - 0.2); nI = 0; isDone = false; }
      else if (rating === 'hard') { nE = Math.max(1.3, baseE - 0.15); nI = Math.max(1, baseI * 1.2); }
      else if (rating === 'good') { nI = Math.max(1, (baseI === 0 ? 1 : baseI) * baseE); }
      else if (rating === 'easy') { nE += 0.15; nI = Math.max(4, (baseI === 0 ? 1 : baseI) * baseE * 1.3); }

      currentCard.easeFactor = nE; currentCard.interval = nI; currentCard.state = isDone ? 'graduated' : 'learning';
      if (isDone) { const nextD = new Date(); nextD.setDate(nextD.getDate() + Math.round(nI)); nextD.setHours(0,0,0,0); currentCard.nextReviewDate = nextD.getTime(); }
      else { appState.sessionQueue.splice(Math.min(appState.sessionQueue.length, Math.floor(Math.random()*3)+1), 0, currentCard); }
      
      await DB.updateCard(currentCard); appState.isFlipped = false;
      if (appState.sessionQueue.length === 0) showFinishedScreen(); else { updateSessionUI(); readCurrent(); }
    };

    const toggleFlip = () => { if (appState.sessionQueue.length === 0) return; appState.isFlipped = !appState.isFlipped; updateSessionUI(); readCurrent(); };

    const updateSessionUI = () => {
      document.getElementById('progress-text').textContent = `${appState.sessionQueue.length} / ${appState.initialTotal}`; document.getElementById('progress-bar').style.width = `${(appState.seenCardIds.size / appState.initialTotal) * 100}%`;
      const cur = appState.sessionQueue[0];
      if (!appState.isFlipped) {
        document.getElementById('card-front').classList.remove('hidden'); document.getElementById('card-back').classList.add('hidden'); document.getElementById('srs-buttons').classList.add('hidden');
        document.getElementById('front-word').textContent = cur.front;
      } else {
        document.getElementById('card-front').classList.add('hidden'); document.getElementById('card-back').classList.remove('hidden'); document.getElementById('srs-buttons').classList.remove('hidden');
        const b = document.getElementById('back-lines'); b.innerHTML = '';
        JSON.parse(cur.backLines).forEach(l => {
          const d = document.createElement('div');
          if (l.startsWith('例句：')) d.className = 'text-sm sm:text-base leading-relaxed text-indigo-900 font-bold bg-indigo-50/70 p-4 rounded-xl flex items-start shadow-sm', d.innerHTML = `<span class="flex-1">${l}</span><button onclick="event.stopPropagation(); readCurrent()" class="ml-3 p-2 text-indigo-500 hover:bg-indigo-100 rounded-full transition-colors bg-white shadow-sm"><i data-lucide="volume-2" class="w-5 h-5"></i></button>`;
          else d.className = 'text-base sm:text-lg leading-relaxed text-slate-700 px-3 font-extrabold', d.innerHTML = l;
          b.appendChild(d);
        });
        lucide.createIcons();
      }
    };

    const speak = (t) => { window.speechSynthesis.cancel(); if (!t) return; const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; window.speechSynthesis.speak(u); };
    const readCurrent = () => { if (appState.sessionQueue.length === 0) return; speak(appState.isFlipped ? appState.sessionQueue[0].exampleTTS : appState.sessionQueue[0].wordTTS); };

    const returnToDashboard = () => { document.getElementById('view-learning').classList.add('hidden'); document.getElementById('view-dashboard').classList.remove('hidden'); loadDashboard(); loadDailyReport(); };
    const showFinishedScreen = () => { document.getElementById('view-learning').classList.add('hidden'); document.getElementById('view-finished').classList.remove('hidden'); };
    const finishSession = async () => { 
      appState.dailyReport.sessions++; // 正確增加練習次數
      localStorage.setItem('srsDailyReport', JSON.stringify(appState.dailyReport));
      document.getElementById('view-finished').classList.add('hidden'); document.getElementById('view-dashboard').classList.remove('hidden'); await loadDashboard(); await loadDailyReport(); if (document.getElementById('auto-backup-toggle').checked) exportDatabase('AutoBackup'); 
    };

    document.getElementById('flashcard').addEventListener('click', () => toggleFlip());
    document.getElementById('btn-speak-front').addEventListener('click', (e) => { e.stopPropagation(); readCurrent(); });
    window.addEventListener('keydown', (e) => {
      if (!document.getElementById('modal-settings').classList.contains('hidden')) return; 
      if (document.getElementById('view-learning').classList.contains('hidden') || appState.sessionQueue.length === 0) return;
      if (e.key === 'Enter') readCurrent(); else if (e.key === ' ') { e.preventDefault(); toggleFlip(); }
    });

    const exportDatabase = async (p = 'Backup') => {
      const d = await DB.getAllDecks(); const c = await DB.getAllCards(); const data = { decks: d, cards: c, date: new Date().toISOString() };
      const url = URL.createObjectURL(new Blob([JSON.stringify(data)], { type: 'application/json' }));
      const a = document.createElement('a'); a.href = url; a.download = `FlashcardSRS_${p}_${new Date().toISOString().split('T')[0]}.json`; a.click();
    };
    const importDatabase = (e) => {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = async (ev) => {
        try { const d = JSON.parse(ev.target.result); if (confirm('匯入？')) { for (const de of d.decks) await DB.putDeck(de); await DB.putCards(d.cards); alert('成功'); await loadDashboard(); } } catch (e) { alert('失敗'); }
      }; r.readAsText(f);
    };
  </script>
</body>
